  the-gate-keeper:
    build:
      dockerfile: TheGatekeeper.Server/Dockerfile
    secrets:
      - api_key
      - mongoDbConnectionString
      - mongoDbUser
      - mongoDbPassword
      - discordWebhook
    ports:
      - "8891:80"
      # - "8891:8890"
      # - "7234:7234"
    networks:
      - my-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    # Keycloak does not support _FILE env var suffix, so we read the secrets manually
    entrypoint: ["/bin/bash", "-c", "export KEYCLOAK_ADMIN=$$(cat /run/secrets/keycloak_admin) && export KEYCLOAK_ADMIN_PASSWORD=$$(cat /run/secrets/keycloak_admin_password) && exec /opt/keycloak/bin/kc.sh start-dev"]
    ports:
      - "8892:8080"
    #command: start-dev
    networks:
      - my-network
    depends_on:
      keycloak-db:
        condition: service_healthy
    secrets:
      - keycloak_admin
      - keycloak_admin_password

  keycloak-db:
    image: postgres:15
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
      # restore disabled: admin credentials changed, fresh init needed to create new admin
      # - ./backups/keycloak_dump_utf8.sql:/docker-entrypoint-initdb.d/keycloak_dump_utf8.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - my-network

secrets:
  api_key:
    file: ./secrets/api_key
  mongoDbConnectionString:
    file: ./secrets/mongoDbConnectionString
  mongoDbUser:
    file: ./secrets/mongoDbUser
  mongoDbPassword:
    file: ./secrets/mongoDbPassword
  discordWebhook:
    file: ./secrets/discordWebhook
  keycloak_admin:
    file: ./secrets/keycloak_admin
  keycloak_admin_password:
    file: ./secrets/keycloak_admin_password

networks:
  my-network:
    driver: bridge

volumes:
  mongo-data:
  keycloak-db-data: